<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARANORMAL DATABASE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Roboto+Mono:wght@400;700&display=swap');
        :root { --rosso: #ff0000; --oro: #ffd700; --nero: #000000; }
        html, body { background-color: var(--nero); color: var(--rosso); font-family: 'Roboto Mono', monospace; margin: 0; min-height: 100vh; overflow-y: auto !important; }
        .header-top { display: flex; justify-content: space-between; padding: 10px 20px; background: #000; border-bottom: 1px solid #222; }
        .logo { font-family: 'Nosifer', sans-serif; color: var(--rosso); font-size: 1.2em; }
        .vip-banner { background: linear-gradient(to bottom, #800 0%, var(--rosso) 10%, #000 100%); border: 1px solid var(--oro); color: var(--oro); text-align: center; padding: 15px; font-family: 'Creepster', cursive; font-size: 1.6em; cursor: pointer; }
        .main-layout { display: grid; grid-template-columns: 280px 1fr 280px; gap: 10px; padding: 15px; }
        .sidebar { background: #050505; padding: 15px; border: 1px solid #1a1a1a; }
        .sidebar-title { font-family: 'Creepster', cursive; font-size: 1.4em; text-align: center; border-bottom: 1px solid #400; margin-bottom: 15px; }
        .story-link { padding: 10px; cursor: pointer; font-size: 0.9em; border-bottom: 1px solid #111; text-transform: uppercase; }
        .story-link:hover { color: #fff; background: #200; }
        .center-content { background: #020202; border: 1px solid #1a1a1a; padding: 20px; display: flex; flex-direction: column; min-height: 500px; }
        #terminal-output { color: #ccc; font-size: 1.1em; line-height: 1.8; white-space: pre-wrap; margin-bottom: 20px; }
        .evoca-box { display: flex; gap: 10px; background: #000; padding: 15px; border: 1px solid #300; margin-top: auto; }
        input { flex: 1; background: #080808; border: 1px solid #400; color: var(--rosso); padding: 12px; font-family: 'Roboto Mono'; }
        .btn-evoca { background: #400; color: #000; border: none; padding: 0 25px; font-family: 'Creepster'; font-size: 1.4em; cursor: pointer; }
        @media (max-width: 1000px) { .main-layout { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>
    <div class="header-top"><div class="logo">PARANORMAL</div></div>
    <div class="vip-banner">SBLOCCA TUTTI I CASI E LA RICERCA LIBERA - DIVENTA VIP</div>
    <div class="main-layout">
        <div class="sidebar"><div class="sidebar-title">EUROPE_FILES</div><div id="col-sin"></div></div>
        <div class="center-content">
            <div id="terminal-output">>>> DATABASE ONLINE. SELEZIONA UN DOSSIER...</div>
            <div class="evoca-box">
                <input type="text" id="query" placeholder="Soggetto da evocare...">
                <button class="btn-evoca" onclick="evoca()">EVOCA</button>
            </div>
        </div>
        <div class="sidebar"><div class="sidebar-title">GLOBAL_DEATH</div><div id="col-des"></div></div>
    </div>

    <script>
        // TRUCCO: Abbiamo rimosso la barra finale e aggiunto un controllo di fallback
        const API = "https://archivio-paranormale-production.up.railway.app";

        async function carica() {
            try {
                const res = await fetch(`${API}/titoli`, { method: 'GET', mode: 'cors' });
                const data = await res.json();
                const fill = (id, list) => {
                    const box = document.getElementById(id);
                    box.innerHTML = "";
                    list.forEach(t => {
                        const d = document.createElement('div');
                        d.className = 'story-link';
                        d.innerText = "† " + t.titolo;
                        d.onclick = () => genera(t.titolo);
                        box.appendChild(d);
                    });
                };
                fill('col-sin', data.sinistra);
                fill('col-des', data.destra);
            } catch (e) {
                console.error("Tentativo...");
                setTimeout(carica, 2000); 
            }
        }

        async function genera(t) {
            const out = document.getElementById('terminal-output');
            out.innerText = ">>> ACCESSO FILE: " + t.toUpperCase() + "\n>>> ESTRAZIONE IN CORSO...";
            try {
                const res = await fetch(`${API}/genera-storia`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titolo: t })
                });
                const data = await res.json();
                out.innerText = data.testo;
                window.scrollTo({top: 0, behavior: 'smooth'});
            } catch (e) {
                out.innerText = ">>> ERRORE: Il server Railway sta dormendo. Attendi 10 secondi e riprova cliccando di nuovo.";
            }
        }

        function evoca() {
            const v = document.getElementById('query').value;
            if(v) genera(v);
        }

        carica();
    </script>
</body>
</html>
