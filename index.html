<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Oscuro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --pargamena: #f4e4bc;
            --sangue: #8a0707;
            --inchiostro: #1a1a1a;
        }

        body {
            background-color: #050505;
            color: var(--inchiostro);
            font-family: 'Special Elite', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .pergamena {
            background: var(--pargamena);
            width: 90%;
            max-width: 800px;
            min-height: 80vh;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 100px rgba(139, 69, 19, 0.3);
            border: 2px solid #5d4037;
            position: relative;
            margin: 20px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            text-align: center;
            font-size: 3em;
            color: var(--sangue);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            border-bottom: 2px double var(--sangue);
        }

        .sezione-titoli {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .colonna {
            flex: 1;
        }

        .titolo-item {
            padding: 10px;
            margin: 5px 0;
            cursor: pointer;
            border-bottom: 1px dotted rgba(0,0,0,0.2);
            transition: all 0.3s;
            font-size: 1.1em;
        }

        .titolo-item:hover {
            color: var(--sangue);
            background: rgba(138, 7, 7, 0.05);
            transform: translateX(5px);
        }

        #schermo-storia {
            display: none;
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 1.2em;
            animation: fadeIn 2s;
        }

        .loading {
            display: none;
            text-align: center;
            font-style: italic;
            color: var(--sangue);
            margin-top: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .btn-indietro {
            display: none;
            margin-top: 30px;
            padding: 10px 20px;
            background: var(--sangue);
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Cinzel', serif;
        }
    </style>
</head>
<body>

    <div class="pergamena">
        <div id="interfaccia-principale">
            <h1>Archivio Oscuro</h1>
            <div class="sezione-titoli">
                <div class="colonna" id="col-sinistra"></div>
                <div class="colonna" id="col-destra"></div>
            </div>
        </div>

        <div id="caricamento" class="loading">Invocando gli spiriti della cronaca...</div>

        <div id="schermo-storia">
            <h2 id="titolo-storia" style="color:var(--sangue); text-align:center;"></h2>
            <div id="testo-storia"></div>
            <button class="btn-indietro" onclick="tornaIndietro()">Chiudi Cronaca</button>
        </div>
    </div>

    <script>
        // LINK AL TUO NUOVO SERVER RAILWAY
        const API_URL = "https://archivio-paranormale-production.up.railway.app";

        async function caricaTitoli() {
            try {
                const response = await fetch(`${API_URL}/titoli`);
                const data = await response.json();
                
                const colSin = document.getElementById('col-sinistra');
                const colDes = document.getElementById('col-destra');

                data.sinistra.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'titolo-item';
                    div.innerText = t.titolo;
                    div.onclick = () => generaStoria(t.titolo);
                    colSin.appendChild(div);
                });

                data.destra.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'titolo-item';
                    div.innerText = t.titolo;
                    div.onclick = () => generaStoria(t.titolo);
                    colDes.appendChild(div);
                });
            } catch (err) {
                console.error("Errore nel risveglio dei titoli:", err);
            }
        }

        async function generaStoria(titolo) {
            document.getElementById('interfaccia-principale').style.display = 'none';
            document.getElementById('caricamento').style.display = 'block';
            
            try {
                const response = await fetch(`${API_URL}/genera-storia`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titolo })
                });
                const data = await response.json();
                
                document.getElementById('caricamento').style.display = 'none';
                document.getElementById('schermo-storia').style.display = 'block';
                document.querySelector('.btn-indietro').style.display = 'block';
                document.getElementById('titolo-storia').innerText = titolo;
                document.getElementById('testo-storia').innerText = data.testo;
            } catch (err) {
                alert("L'oscurità ha reciso il legame. Riprova.");
                tornaIndietro();
            }
        }

        function tornaIndietro() {
            document.getElementById('schermo-storia').style.display = 'none';
            document.getElementById('interfaccia-principale').style.display = 'block';
            document.getElementById('caricamento').style.display = 'none';
        }

        // Avvio
        caricaTitoli();
    </script>
</body>
</html>
