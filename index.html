<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Archivio Oscuro</title>
    <style>
        body { background: #050505; color: #f4e4bc; font-family: serif; text-align: center; }
        .titolo-item { cursor: pointer; padding: 10px; border: 1px dotted #8a0707; margin: 10px; display: inline-block; }
        #storia { white-space: pre-wrap; margin-top: 20px; text-align: left; padding: 20px; }
    </style>
</head>
<body>
    <h1>ARCHIVIO OSCURO</h1>
    <div id="lista-titoli">Caricamento titoli in corso...</div>
    <div id="storia"></div>

    <script>
        const API_URL = "https://archivio-paranormale-production.up.railway.app";

        async function carica() {
            try {
                console.log("Tentativo di connessione a:", API_URL);
                const res = await fetch(API_URL + "/titoli");
                const data = await res.json();
                let html = "";
                data.sinistra.concat(data.destra).forEach(t => {
                    html += `<div class="titolo-item" onclick="genera('${t.titolo}')">${t.titolo}</div>`;
                });
                document.getElementById("lista-titoli").innerHTML = html;
            } catch (e) {
                document.getElementById("lista-titoli").innerHTML = "Errore di connessione al server Railway.";
                console.error(e);
            }
        }

        async function genera(t) {
            document.getElementById("storia").innerHTML = "Invocazione in corso...";
            try {
                const res = await fetch(API_URL + "/genera-storia", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ titolo: t })
                });
                const data = await res.json();
                document.getElementById("storia").innerHTML = "<h2>" + t + "</h2>" + data.testo;
            } catch (e) {
                alert("Errore nella generazione.");
            }
        }
        carica();
    </script>
</body>
</html>
