<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARANORMAL DATABASE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Roboto+Mono:wght@400;700&display=swap');

        :root {
            --rosso: #ff0000;
            --oro: #ffd700;
            --nero: #000000;
        }

        /* RESET TOTALE PER LO SCROLL */
        html {
            background-color: var(--nero);
            overflow-x: hidden;
            overflow-y: auto !important;
        }

        body {
            background-color: var(--nero);
            color: var(--rosso);
            font-family: 'Roboto Mono', monospace;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: #000;
            border-bottom: 1px solid #222;
        }

        .logo { font-family: 'Nosifer', sans-serif; color: var(--rosso); font-size: 1.2em; }
        .nav-links a { color: var(--rosso); text-decoration: none; margin-left: 15px; font-size: 0.8em; }

        .vip-banner {
            background: linear-gradient(to bottom, #800 0%, var(--rosso) 10%, #000 100%);
            border-top: 2px solid var(--oro);
            border-bottom: 2px solid var(--oro);
            color: var(--oro);
            text-align: center;
            padding: 15px;
            font-family: 'Creepster', cursive;
            font-size: 1.6em;
            cursor: pointer;
            text-transform: uppercase;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 10px;
            padding: 15px;
            flex: 1;
        }

        .sidebar {
            background: #050505;
            padding: 15px;
            border: 1px solid #1a1a1a;
            height: fit-content;
        }

        .sidebar-title {
            font-family: 'Creepster', cursive;
            color: var(--rosso);
            font-size: 1.4em;
            text-align: center;
            border-bottom: 1px solid #400;
            margin-bottom: 15px;
        }

        .story-link {
            padding: 10px;
            cursor: pointer;
            font-size: 0.9em;
            border-bottom: 1px solid #111;
            text-transform: uppercase;
        }
        .story-link:hover { color: #fff; background: #200; }

        .center-content {
            background: #020202;
            border: 1px solid #1a1a1a;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* AREA STORIA: ORA SI ALLUNGA AUTOMATICAMENTE */
        #terminal-output {
            color: #ccc;
            font-size: 1.1em;
            line-height: 1.8;
            white-space: pre-wrap;
            margin-bottom: 20px;
            word-wrap: break-word;
        }

        .evoca-box {
            display: flex;
            gap: 10px;
            background: #000;
            padding: 15px;
            border: 1px solid #300;
            margin-top: auto; /* Lo tiene in fondo alla storia */
        }

        input {
            flex: 1;
            background: #080808;
            border: 1px solid #400;
            color: var(--rosso);
            padding: 12px;
            font-family: 'Roboto Mono';
        }

        .btn-evoca {
            background: #400;
            color: #000;
            border: none;
            padding: 0 25px;
            font-family: 'Creepster';
            font-size: 1.4em;
            cursor: pointer;
        }
        .btn-evoca:hover { background: var(--rosso); }

        /* MODALE */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #111;
            border: 3px solid var(--oro);
            padding: 25px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        @media (max-width: 1000px) {
            .main-layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <div class="header-top">
        <div class="logo">PARANORMAL</div>
        <div class="nav-links">
            <a href="#">ADMIN</a>
            <a href="mailto:portaleparanormale@gmail.com">CONTATTAMI</a>
        </div>
    </div>

    <div class="vip-banner" onclick="document.getElementById('vip-modal').style.display='flex'">
        SBLOCCA TUTTI I CASI E LA RICERCA LIBERA - DIVENTA VIP
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="sidebar-title">EUROPE_FILES</div>
            <div id="col-sin"></div>
        </div>

        <div class="center-content">
            <div id="terminal-output">>>> SISTEMA PRONTO. SELEZIONA UN DOSSIER...</div>
            <div class="evoca-box">
                <input type="text" id="query" placeholder="Soggetto da evocare...">
                <button class="btn-evoca" onclick="evoca()">EVOCA</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-title">GLOBAL_DEATH</div>
            <div id="col-des"></div>
        </div>
    </div>

    <div class="modal" id="vip-modal">
        <div class="modal-content">
            <h2 style="font-family:'Creepster'; color:var(--oro); font-size: 2.5em;">ACCESSO VIP</h2>
            <div style="text-align: left; background: #222; padding: 15px; border-left: 4px solid var(--oro); margin-bottom: 10px;">
                1. Invia 5€ (Amici/Familiari) a:<br><b style="color:var(--oro)">perruccigregorio31@gmail.com</b>
                <a href="https://www.paypal.com/paypalme/perruccigregorio31/5" target="_blank" style="color:white; background:#0070ba; padding:8px; text-decoration:none; display:block; margin-top:5px; text-align: center; border-radius: 4px;">PAGA CON PAYPAL</a>
            </div>
            <div style="text-align: left; background: #222; padding: 15px; border-left: 4px solid var(--oro); margin-bottom: 10px;">
                2. Invia ricevuta a:<br><b style="color:var(--oro)">portaleparanormale@gmail.com</b>
            </div>
            <button onclick="document.getElementById('vip-modal').style.display='none'" style="background:none; border:1px solid #444; color:white; padding:10px 30px; cursor:pointer;">CHIUDI</button>
        </div>
    </div>

    <script>
        const API = "https://archivio-paranormale-production.up.railway.app";

        async function carica() {
            try {
                const res = await fetch(`${API}/titoli`);
                if(!res.ok) throw new Error();
                const data = await res.json();
                const fill = (id, list) => {
                    const box = document.getElementById(id);
                    list.forEach(t => {
                        const d = document.createElement('div');
                        d.className = 'story-link';
                        d.innerText = "† " + t.titolo;
                        d.onclick = () => {
                            genera(t.titolo);
                            // Su mobile scrolla fino alla storia
                            if(window.innerWidth < 1000) {
                                document.querySelector('.center-content').scrollIntoView({behavior: 'smooth'});
                            }
                        };
                        box.appendChild(d);
                    });
                };
                fill('col-sin', data.sinistra);
                fill('col-des', data.destra);
            } catch (e) { 
                document.getElementById('terminal-output').innerText = "ERRORE: IL DATABASE NON RISPONDE. RIPROVA TRA POCHI SECONDI."; 
            }
        }

        async function genera(t) {
            const out = document.getElementById('terminal-output');
            out.innerText = ">>> ACCESSO FILE: " + t.toUpperCase() + "\n>>> CARICAMENTO DATI...\n>>> ATTENDERE...";
            
            try {
                const res = await fetch(`${API}/genera-storia`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({titolo: t})
                });
                const data = await res.json();
                out.innerText = data.testo;
                // Scroll in alto per leggere dall'inizio
                window.scrollTo({top: 0, behavior: 'smooth'});
            } catch (e) { 
                out.innerText = "ERRORE: L'oscurità ha interrotto la connessione."; 
            }
        }

        function evoca() {
            const v = document.getElementById('query').value;
            if(v) genera(v);
        }

        carica();
    </script>
</body>
</html>
