<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Purgatory: Occult Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=EB+Garamond&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root { --blood: #aa0000; --ghost: #f0f0f0; --gold: #ffcc00; }
        body { margin: 0; background: #000; color: var(--ghost); font-family: 'Special Elite', serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; text-transform: uppercase; }
        .navbar { background: #111; color: var(--blood); padding: 10px 15px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--blood); }
        .vip-banner { background: linear-gradient(90deg, #440000, #aa0000, #440000); color: var(--gold); padding: 12px; text-align: center; font-family: 'Creepster'; cursor: pointer; animation: pulse 2s infinite; }
        .wrapper { display: flex; flex-grow: 1; overflow: hidden; }
        .sidebar { width: 250px; background: #080808; border-right: 1px solid #1a1a1a; overflow-y: auto; }
        .side-title { font-family: 'Creepster'; color: var(--blood); padding: 15px; text-align: center; border-bottom: 1px solid var(--blood); }
        .file-link { padding: 12px; font-size: 13px; border-bottom: 1px solid #111; cursor: pointer; color: #888; }
        .file-link:hover { color: var(--gold); background: #111; }
        .main-console { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        .display-area { flex-grow: 1; padding: 30px; overflow-y: auto; font-family: 'EB Garamond', serif; font-size: 22px; text-transform: none; line-height: 1.6; text-align: justify; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; border: 2px solid var(--gold); z-index: 1000; width: 90%; max-width: 400px; padding: 20px; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        @media (max-width: 768px) { .wrapper { flex-direction: column; } .sidebar { width: 100%; max-height: 200px; } }
    </style>
</head>
<body>
    <div class="navbar"><div style="font-family:'Creepster'; font-size:24px;">PROJECT PURGATORY</div></div>
    <div class="vip-banner" onclick="openVip()">SBLOCCA IL TOMO PROIBITO - VIP</div>
    <div class="wrapper">
        <div class="sidebar"><div class="side-title">ARCHIVIO_OSCURO</div><div id="menu"></div></div>
        <div class="main-console"><div class="display-area" id="ui-text">Seleziona una cronaca per iniziare...</div></div>
    </div>

    <div id="payment-modal" class="modal">
        <h2 style="font-family:'Creepster'; color:var(--blood);">ACCESSO VIP</h2>
        <p>Invia 5€ via PayPal a:<br><b>perruccigregorio31@gmail.com</b></p>
        <p>Invia screenshot a: portaleparanormale@gmail.com</p>
        <button onclick="closeVip()" style="background:var(--blood); color:#000; border:none; padding:10px; width:100%; font-family:'Special Elite';">CHIUDI</button>
    </div>

    <script>
        const STORIE = {
            "Il Fantasma di Azzurrina": "Nelle mura del Castello di Montebello, il pianto di una bambina risuona ancora nelle notti di temporale...",
            "Poveglia: L'isola del Male": "Un luogo dove la terra è composta per il 50% da ceneri umane. Le grida dei malati di peste non si sono mai assopite...",
            "Villa de Vecchi": "La casa rossa tra i boschi, dove il tempo si è fermato a una notte di sangue e follia...",
            "Il Manicomio di Mombello": "Migliaia di anime perse vagano tra i corridoi distrutti di quello che fu il più grande ospedale psichiatrico d'Europa..."
        };

        const isVip = localStorage.getItem('isVip') === 'true';

        function renderMenu() {
            const menu = document.getElementById('menu');
            Object.keys(STORIE).forEach((titolo, i) => {
                const d = document.createElement('div');
                d.className = 'file-link';
                d.innerHTML = `† ${titolo} ${(!isVip && i > 1) ? '🔒' : ''}`;
                d.onclick = () => {
                    if (isVip || i <= 1) mostraStoria(titolo);
                    else openVip();
                };
                menu.appendChild(d);
            });
        }

        function mostraStoria(titolo) {
            const ui = document.getElementById('ui-text');
            ui.innerHTML = "";
            let i = 0;
            const testo = STORIE[titolo];
            function scrivi() {
                if (i < testo.length) {
                    ui.innerHTML += testo.charAt(i);
                    i++; setTimeout(scrivi, 15);
                }
            }
            scrivi();
        }

        function openVip() { document.getElementById('payment-modal').style.display='block'; }
        function closeVip() { document.getElementById('payment-modal').style.display='none'; }
        
        renderMenu();
    </script>
</body>
</html>
