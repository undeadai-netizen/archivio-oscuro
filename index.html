<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARANORMAL DATABASE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Roboto+Mono:wght@400;700&display=swap');

        body {
            background-color: #000;
            color: #ff0000;
            font-family: 'Roboto Mono', monospace;
            margin: 0;
            overflow-x: hidden;
        }

        /* Top Bar - Admin/Contattami */
        .top-nav {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            padding: 10px 20px;
            font-size: 0.8em;
        }
        .top-nav a { color: #ff0000; text-decoration: none; text-transform: uppercase; }

        /* Header Titolo */
        header {
            padding: 10px 20px;
            font-family: 'Nosifer', sans-serif;
            font-size: 1.5em;
            letter-spacing: 2px;
        }

        /* Banner VIP Giallo */
        .vip-banner {
            background: linear-gradient(to bottom, #8b0000 0%, #ff0000 10%, #000 100%);
            border-top: 2px solid #ffd700;
            border-bottom: 2px solid #ffd700;
            color: #ffd700;
            text-align: center;
            padding: 15px;
            font-family: 'Creepster', cursive;
            font-size: 1.8em;
            text-transform: uppercase;
            text-shadow: 2px 2px #000;
        }

        /* Layout Principale */
        .main-container {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            min-height: 80vh;
            border-top: 1px solid #333;
        }

        .sidebar {
            padding: 20px;
            border-right: 1px solid #222;
            border-left: 1px solid #222;
        }

        .sidebar-title {
            font-family: 'Creepster', cursive;
            font-size: 1.5em;
            margin-bottom: 20px;
            text-align: center;
        }

        .content-area {
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Lista Storie */
        .story-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .story-link {
            cursor: pointer;
            padding: 5px;
            transition: 0.3s;
        }
        .story-link:hover { background: #300; color: #fff; }

        /* Area Storia Generata */
        #display-storia {
            flex-grow: 1;
            margin: 20px 0;
            border: 1px solid #222;
            padding: 20px;
            color: #ccc;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-y: auto;
        }

        /* Input In basso - BOX EVOCA */
        .evoca-box {
            display: flex;
            gap: 10px;
            border-top: 1px solid #440000;
            padding-top: 20px;
        }

        input[type="text"] {
            flex-grow: 1;
            background: #080808;
            border: 1px solid #440000;
            color: #ff0000;
            padding: 15px;
            font-family: 'Roboto Mono', monospace;
        }

        .btn-evoca {
            background: #550000;
            color: #000;
            border: none;
            padding: 0 40px;
            font-family: 'Creepster', cursive;
            font-size: 1.5em;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-evoca:hover { background: #ff0000; }

        /* PayPal Hidden/Floating Section */
        .support-area { text-align: center; padding: 20px; border-top: 1px solid #222; }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="#">ADMIN</a>
        <a href="mailto:tuaemail@esempio.com">CONTATTAMI</a>
    </div>

    <header>PARANORMAL</header>

    <div class="vip-banner">
        SBLOCCA TUTTI I CASI E LA RICERCA LIBERA - DIVENTA VIP
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-title">EUROPE_FILES</div>
            <div id="col-sinistra" class="story-list"></div>
        </div>

        <div class="content-area">
            <div id="display-storia">
                Seleziona un file dal database o inserisci un'entità per iniziare l'evocazione...
            </div>

            <div class="evoca-box">
                <input type="text" id="input-entita" placeholder="Inserisci il nome di un'entità...">
                <button class="btn-evoca" onclick="evocaDallInput()">EVOCA</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-title">GLOBAL_DEATH</div>
            <div id="col-destra" class="story-list"></div>
        </div>
    </div>

    <div class="support-area">
        <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_top">
            <input type="hidden" name="business" value="LATUAEMAIL@PAYPAL.COM">
            <input type="hidden" name="cmd" value="_xclick">
            <input type="hidden" name="item_name" value="Supporto Database Paranormale">
            <input type="hidden" name="currency_code" value="EUR">
            <input type="image" src="https://www.paypalobjects.com/it_IT/IT/i/btn/btn_donate_SM.gif" name="submit" alt="PayPal">
        </form>
    </div>

    <script>
        const API_URL = "https://archivio-paranormale-production.up.railway.app";

        async function init() {
            try {
                const res = await fetch(`${API_URL}/titoli`);
                const data = await res.json();
                
                const renderList = (containerId, list) => {
                    const container = document.getElementById(containerId);
                    list.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'story-link';
                        div.innerText = "> " + item.titolo;
                        div.onclick = () => genera(item.titolo);
                        container.appendChild(div);
                    });
                };

                renderList('col-sinistra', data.sinistra);
                renderList('col-destra', data.destra);
            } catch (e) {
                console.error("Database offline.");
            }
        }

        async function genera(titolo) {
            const display = document.getElementById('display-storia');
            display.innerText = "ACCESSO AL FILE: " + titolo + "...\nCARICAMENTO DATI...\nESTRAZIONE CRONACA IN CORSO...";
            
            try {
                const res = await fetch(`${API_URL}/genera-storia`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titolo })
                });
                const data = await res.json();
                display.innerText = data.testo;
            } catch (e) {
                display.innerText = "ERRORE CRITICO: CONNESSIONE INTERROTTA.";
            }
        }

        function evocaDallInput() {
            const val = document.getElementById('input-entita').value;
            if(val) genera(val);
        }

        init();
    </script>
</body>
</html>
