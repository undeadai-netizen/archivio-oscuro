<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARANORMAL DATABASE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Roboto+Mono:wght@400;700&display=swap');
        :root { --rosso: #ff0000; --oro: #ffd700; --nero: #000000; }
        
        body { background-color: var(--nero); color: var(--rosso); font-family: 'Roboto Mono', monospace; margin: 0; overflow-x: hidden; }
        
        /* Navigazione */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #000; border-bottom: 2px solid #222; }
        .logo { font-family: 'Nosifer', sans-serif; color: var(--rosso); font-size: 1.2em; text-decoration: none; }
        .nav-links { display: flex; gap: 15px; }
        .nav-links span, .nav-links a { color: var(--rosso); font-size: 0.8em; cursor: pointer; text-decoration: none; border: 1px solid #400; padding: 5px 10px; }

        /* Banner VIP */
        .vip-banner { background: linear-gradient(to bottom, #800, #ff0000, #000); border: 2px solid var(--oro); color: var(--oro); text-align: center; padding: 15px; font-family: 'Creepster', cursive; font-size: 1.8em; cursor: pointer; }

        /* Griglia */
        .main-container { display: grid; grid-template-columns: 250px 1fr 250px; gap: 10px; padding: 15px; }
        .sidebar { background: #050505; border: 1px solid #1a1a1a; padding: 10px; height: fit-content; }
        .sidebar-title { font-family: 'Creepster', cursive; text-align: center; border-bottom: 1px solid #400; margin-bottom: 10px; }
        
        .story-link { padding: 8px; cursor: pointer; font-size: 0.85em; border-bottom: 1px solid #111; }
        .story-link:hover { background: #300; color: #fff; }

        .content-center { background: #020202; border: 1px solid #1a1a1a; padding: 20px; min-height: 500px; display: flex; flex-direction: column; }
        #output { color: #ccc; line-height: 1.7; white-space: pre-wrap; margin-bottom: 20px; }

        /* Evoca */
        .evoca-area { display: flex; gap: 5px; margin-top: auto; padding-top: 20px; }
        input { flex: 1; background: #000; border: 1px solid #500; color: var(--rosso); padding: 10px; font-family: 'Roboto Mono'; }
        button { background: #600; color: #fff; border: none; padding: 10px 20px; font-family: 'Creepster'; font-size: 1.2em; cursor: pointer; }

        /* Popup */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; justify-content: center; align-items: center; }
        .modal-box { background: #111; border: 2px solid var(--oro); padding: 30px; text-align: center; max-width: 400px; }

        @media (max-width: 1000px) { .main-container { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="#" class="logo">PARANORMAL</a>
        <div class="nav-links">
            <span onclick="openM('admin-m')">ADMIN</span>
            <a href="mailto:portaleparanormale@gmail.com">CONTATTAMI</a>
        </div>
    </div>

    <div class="vip-banner" onclick="openM('vip-m')">SBLOCCA TUTTO - DIVENTA VIP</div>

    <div class="main-container">
        <div class="sidebar"><div class="sidebar-title">EUROPE</div><div id="sin"></div></div>
        <div class="content-center">
            <div id="output">>>> SISTEMA PRONTO. SELEZIONA UN CASO...</div>
            <div class="evoca-area">
                <input type="text" id="query" placeholder="Nome entità...">
                <button onclick="evoca()">EVOCA</button>
            </div>
        </div>
        <div class="sidebar"><div class="sidebar-title">GLOBAL</div><div id="des"></div></div>
    </div>

    <div id="vip-m" class="modal"><div class="modal-box"><h2>ACCESSO VIP</h2><p>Invia 5€ a: perruccigregorio31@gmail.com</p><button onclick="closeM('vip-m')">CHIUDI</button></div></div>
    <div id="admin-m" class="modal"><div class="modal-box"><h2>ADMIN</h2><input type="password" placeholder="TOKEN"><button onclick="closeM('admin-m')">ESCI</button></div></div>

    <script>
        const API = "https://archivio-paranormale-production.up.railway.app";

        async function init() {
            try {
                const r = await fetch(`${API}/titoli`);
                const d = await r.json();
                const f = (id, l) => {
                    const b = document.getElementById(id);
                    l.forEach(t => {
                        const div = document.createElement('div');
                        div.className = 'story-link';
                        div.innerText = "† " + t.titolo;
                        div.onclick = () => genera(t.titolo);
                        b.appendChild(div);
                    });
                };
                f('sin', d.sinistra);
                f('des', d.destra);
            } catch (e) { 
                document.getElementById('output').innerText = "SVEGLIA SERVER IN CORSO... ATTENDI 10 SECONDI.";
                setTimeout(init, 5000); 
            }
        }

        async function genera(t) {
            const out = document.getElementById('output');
            out.innerText = ">>> ACCESSO A: " + t.toUpperCase() + "...";
            try {
                const r = await fetch(`${API}/genera-storia`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({titolo: t})
                });
                const d = await r.json();
                out.innerText = d.testo;
                window.scrollTo(0,0);
            } catch (e) {
                out.innerText = ">>> ERRORE. CLICCA DI NUOVO TRA 5 SECONDI.";
            }
        }

        function evoca() { const v = document.getElementById('query').value; if(v) genera(v); }
        function openM(id) { document.getElementById(id).style.display = 'flex'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }
        init();
    </script>
</body>
</html>
