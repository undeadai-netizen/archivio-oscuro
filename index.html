<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Oscuro - Cronache Proibite</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --pergamena: #f4e4bc;
            --sangue: #8a0707;
            --inchiostro: #1a1a1a;
            --oro-antico: #bc9f4c;
        }

        body {
            background-color: #050505;
            color: var(--inchiostro);
            font-family: 'Special Elite', serif;
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        nav {
            background: #000;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 30px;
            border-bottom: 2px solid var(--sangue);
        }

        nav a {
            color: var(--oro-antico);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover { color: var(--sangue); }

        /* Contenitore Principale */
        .container {
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .pergamena {
            background: var(--pergamena);
            width: 100%;
            max-width: 1100px;
            padding: 40px;
            box-shadow: 0 0 60px rgba(0,0,0,0.9), inset 0 0 100px rgba(139, 69, 19, 0.2);
            border: 3px solid #5d4037;
            border-radius: 5px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            text-align: center;
            font-size: 3.5em;
            color: var(--sangue);
            margin: 0 0 30px 0;
            border-bottom: 3px double var(--sangue);
        }

        /* Griglia Sidebars */
        .archivio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .colonna {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .colonna h3 {
            font-family: 'Cinzel', serif;
            color: var(--sangue);
            border-bottom: 1px solid var(--sangue);
            text-align: center;
        }

        .titolo-item {
            padding: 12px;
            border-bottom: 1px dotted rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1em;
        }

        .titolo-item:hover {
            background: rgba(138, 7, 7, 0.1);
            color: var(--sangue);
            padding-left: 20px;
        }

        /* Sezione VIP e PayPal */
        .sezione-extra {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px solid var(--sangue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .vip-box {
            flex: 1;
            background: rgba(0,0,0,0.05);
            padding: 20px;
            border: 1px solid var(--oro-antico);
        }

        .paypal-box {
            text-align: center;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Schermo Storia */
        #schermo-storia {
            display: none;
            animation: fadeIn 1s;
        }

        #testo-storia {
            font-size: 1.2em;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .loading { display: none; text-align: center; color: var(--sangue); font-size: 2em; padding: 50px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 800px) {
            .archivio-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2em; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">HOME</a>
        <a href="mailto:tua-email@esempio.com">CONTATTAMI</a>
        <a href="#">ADMIN</a>
        <a href="#vip">SEZIONE VIP</a>
    </nav>

    <div class="container">
        <div class="pergamena">
            
            <div id="interfaccia-principale">
                <h1>ARCHIVIO OSCURO</h1>
                
                <div class="archivio-grid">
                    <div class="colonna" id="col-sinistra">
                        <h3>STORIE DALL'ABISSO</h3>
                        </div>
                    <div class="colonna" id="col-destra">
                        <h3>CRONACHE PROIBITE</h3>
                        </div>
                </div>

                <div class="sezione-extra" id="vip">
                    <div class="vip-box">
                        <h2 style="font-family: 'Cinzel'; color: var(--sangue);">SEZIONE VIP</h2>
                        <p>Accedi a contenuti esclusivi e storie personalizzate dai luoghi più oscuri della terra.</p>
                        <button style="background:var(--sangue); color:white; padding:10px; border:none; cursor:pointer; font-family:'Cinzel';">ACCEDI ORA</button>
                    </div>

                    <div class="paypal-box">
                        <p style="margin:0 0 10px 0; font-weight:bold;">Sostieni l'Archivio</p>
                        <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_top">
                            <input type="hidden" name="cmd" value="_xclick">
                            <input type="hidden" name="business" value="LATUAEMAIL@PAYPAL.COM">
                            <input type="hidden" name="item_name" value="Donazione Archivio Oscuro">
                            <input type="hidden" name="currency_code" value="EUR">
                            <input type="image" src="https://www.paypalobjects.com/it_IT/IT/i/btn/btn_donateCC_LG.gif" border="0" name="submit" alt="PayPal">
                        </form>
                    </div>
                </div>
            </div>

            <div id="caricamento" class="loading">Invocando gli spiriti...</div>

            <div id="schermo-storia">
                <h2 id="titolo-storia" style="color:var(--sangue); text-align:center; font-family:'Cinzel';"></h2>
                <div id="testo-storia"></div>
                <button onclick="tornaIndietro()" style="display:block; margin:30px auto; padding:15px 30px; background:var(--sangue); color:white; border:none; cursor:pointer; font-family:'Cinzel';">TORNA ALL'ARCHIVIO</button>
            </div>

        </div>
    </div>

    <script>
        const API_URL = "https://archivio-paranormale-production.up.railway.app";

        async function caricaTitoli() {
            try {
                const response = await fetch(`${API_URL}/titoli`);
                const data = await response.json();
                
                const colSin = document.getElementById('col-sinistra');
                const colDes = document.getElementById('col-destra');

                data.sinistra.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'titolo-item';
                    div.innerText = t.titolo;
                    div.onclick = () => generaStoria(t.titolo);
                    colSin.appendChild(div);
                });

                data.destra.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'titolo-item';
                    div.innerText = t.titolo;
                    div.onclick = () => generaStoria(t.titolo);
                    colDes.appendChild(div);
                });
            } catch (err) {
                console.error("Errore titoli");
            }
        }

        async function generaStoria(titolo) {
            document.getElementById('interfaccia-principale').style.display = 'none';
            document.getElementById('caricamento').style.display = 'block';
            window.scrollTo(0,0);
            
            try {
                const response = await fetch(`${API_URL}/genera-storia`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titolo })
                });
                const data = await response.json();
                document.getElementById('caricamento').style.display = 'none';
                document.getElementById('schermo-storia').style.display = 'block';
                document.getElementById('titolo-storia').innerText = titolo;
                document.getElementById('testo-storia').innerText = data.testo;
            } catch (err) {
                alert("Errore!");
                tornaIndietro();
            }
        }

        function tornaIndietro() {
            document.getElementById('schermo-storia').style.display = 'none';
            document.getElementById('interfaccia-principale').style.display = 'block';
            document.getElementById('caricamento').style.display = 'none';
        }

        caricaTitoli();
    </script>
</body>
</html>
