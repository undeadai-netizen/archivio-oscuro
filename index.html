<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="4zeE1NL8ee1ydC738yT4eAt7hW75pk2G_2GfZvuqnSY" />
    <title>Project Purgatory: Occult Archive</title>
    <meta name="description" content="Project Purgatory: L'archivio segreto delle cronache paranormali.">
    
    <meta property="og:title" content="Project Purgatory: Occult Archive">
    <meta property="og:image" content="https://undeadai-netizen.github.io/archivio-paranormal/cover.png">

    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root { --blood: #aa0000; --ghost: #f0f0f0; --gold: #ffcc00; --dark-bg: #080808; }
        
        body { 
            margin: 0; padding: 0; background: #000; color: var(--ghost); 
            font-family: 'Special Elite', serif; display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden; text-transform: uppercase; 
        }

        /* NAVBAR COMPATTA */
        .navbar { 
            background: #111; color: var(--blood); padding: 8px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--blood); z-index: 100;
        }
        .nav-title { font-family: 'Creepster'; font-size: 20px; }
        .nav-link { color: var(--blood); text-decoration: none; font-size: 11px; margin-left: 10px; }

        .vip-banner { 
            background: linear-gradient(90deg, #440000, #aa0000, #440000); 
            color: var(--gold); padding: 10px; text-align: center; 
            font-family: 'Creepster'; font-size: 18px; cursor: pointer; 
            border-bottom: 2px solid var(--gold); text-shadow: 2px 2px #000;
        }

        /* LAYOUT RESPONSIVE */
        .wrapper { display: flex; flex-grow: 1; overflow: hidden; }

        .sidebar { 
            width: 250px; background: var(--dark-bg); 
            border-right: 1px solid #222; overflow-y: auto; 
            transition: 0.3s;
        }

        .main-console { 
            flex-grow: 1; display: flex; flex-direction: column; 
            background: radial-gradient(circle, #111 0%, #000 100%); 
            position: relative; overflow: hidden;
        }

        /* DISPLAY AREA OTTIMIZZATA PER MOBILE */
        .display-area { 
            flex-grow: 1; padding: 25px; overflow-y: auto; 
            font-family: 'EB Garamond', serif; font-size: 20px; 
            line-height: 1.6; color: #ccc; text-transform: none; text-align: justify;
        }
        .display-area::first-letter { 
            font-family: 'Creepster'; font-size: 60px; color: var(--blood); 
            float: left; margin-right: 8px; line-height: 1; 
        }

        /* SIDEBARS SU MOBILE: DIVENTANO COMPATTE */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            .wrapper { flex-direction: column; height: auto; overflow: visible; }
            .sidebar { 
                width: 100%; max-height: 200px; border-right: none; 
                border-bottom: 1px solid var(--blood); 
            }
            .display-area { min-height: 400px; padding: 20px; font-size: 18px; }
            .nav-title { font-size: 18px; }
        }

        .side-title { 
            font-family: 'Creepster'; color: var(--blood); font-size: 18px; 
            padding: 10px; background: #111; position: sticky; top: 0;
        }
        .file-link { 
            padding: 10px 15px; font-size: 12px; border-bottom: 1px solid #111; 
            cursor: pointer; color: #888; display: flex; justify-content: space-between;
        }
        .file-link:hover { color: var(--gold); background: #0c0c0c; }

        /* CONDIVISIONE */
        .share-container { 
            display: none; padding: 15px; background: #050505; 
            border-top: 1px solid var(--blood); text-align: center; 
        }
        .share-buttons { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .share-btn { width: 35px; height: 35px; cursor: pointer; filter: invert(1); }

        /* INPUT BOX */
        .input-box { 
            background: #000; border-top: 2px solid var(--blood); 
            padding: 10px; display: flex; gap: 8px;
        }
        input { 
            flex-grow: 1; background: #111; border: 1px solid #333; 
            color: #fff; padding: 10px; font-family: 'Special Elite'; font-size: 14px; 
        }
        .evoca-btn { 
            background: var(--blood); color: #000; border: none; 
            padding: 0 15px; font-family: 'Creepster'; font-size: 18px;
        }

        /* MODALE PAGAMENTO */
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: #0a0a0a; 
            border: 2px solid var(--gold); z-index: 1000; width: 85%; max-width: 400px;
        }
        .modal-header { background: var(--blood); color: #000; padding: 10px; font-family: 'Creepster'; text-align: center; }
        .modal-body { padding: 20px; font-size: 14px; text-transform: none; }
        .step { background: #151515; padding: 10px; margin-bottom: 10px; border-left: 3px solid var(--gold); }
        .paypal-btn { background: #0070ba; color: #fff; width: 100%; padding: 10px; border: none; margin-top: 5px; cursor: pointer; font-weight: bold; }
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; }
    </style>
</head>
<body>
    <div id="overlay" onclick="closeVip()"></div>
    
    <div class="navbar">
        <div class="nav-title">PROJECT PURGATORY</div>
        <div class="nav-right">
            <a class="nav-link" href="mailto:portaleparanormale@gmail.com">CONTATTI</a>
            <span class="nav-link" onclick="accessAdmin()" style="cursor:pointer">ADMIN</span>
        </div>
    </div>

    <div class="vip-banner" onclick="openVip()">SBLOCCA ACCESSO VIP</div>

    <div class="wrapper">
        <div class="sidebar">
            <div class="side-title">EUROPE_FILES</div>
            <div id="menu-left"></div>
        </div>

        <div class="main-console">
            <div class="display-area" id="ui-text">Sussurra un nome per iniziare l'evocazione...</div>
            
            <div class="share-container" id="share-box">
                <div style="font-size: 12px; color: var(--gold);">DIFFONDI IL TERRORE</div>
                <div class="share-buttons">
                    <img class="share-btn" src="https://cdn-icons-png.flaticon.com/512/733/733585.png" onclick="share('wa')">
                    <img class="share-btn" src="https://cdn-icons-png.flaticon.com/512/733/733547.png" onclick="share('fb')">
                    <img class="share-btn" src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" onclick="share('tg')">
                </div>
            </div>

            <div class="input-box" id="search-box">
                <input type="text" id="user-prompt" placeholder="Nome o luogo...">
                <button class="evoca-btn" onclick="generaCustom()">EVOCA</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="side-title">GLOBAL_DEATH</div>
            <div id="menu-right"></div>
        </div>
    </div>

    <div id="payment-modal" class="modal">
        <div class="modal-header">Patto di Sangue (VIP)</div>
        <div class="modal-body">
            <div class="step"><b>1. Offerta (5€)</b> PayPal: <br><i>perruccigregorio31@gmail.com</i>
                <button class="paypal-btn" onclick="window.open('https://www.paypal.com')">PAGA</button>
            </div>
            <div class="step"><b>2. Sigillo</b> Inserisci Token:
                <input type="text" id="token-field" style="width:80%; padding:5px; margin-top:5px; background:#000; color:var(--gold); border:1px solid var(--gold);">
                <button onclick="validaToken()" style="background:var(--gold); border:none; padding:5px; margin-top:5px; width:100%; cursor:pointer;">ATTIVA</button>
            </div>
            <button class="close-btn" onclick="closeVip()" style="width:100%; background:none; color:#555; border:none; margin-top:10px; cursor:pointer;">[ CHIUDI ]</button>
        </div>
    </div>

    <script>
        const API_URL = "https://archivio-paranormale.onrender.com";
        const SITE_URL = "https://undeadai-netizen.github.io/archivio-paranormal/";
        const VIP_TOKENS = ["VIP_9921", "GHOST_882", "MALEDETTO_2024", "GREGORIO_VIP"];
        let isVip = localStorage.getItem('isVipOmbre') === 'true';
        let currentText = ""; let currentTitle = "";

        function init() {
            if (isVip) {
                document.getElementById('main-banner').innerText = "ACCESSO VIP ATTIVO";
                document.getElementById('main-banner').style.background = "var(--gold)";
                document.getElementById('main-banner').style.color = "#000";
            }
            loadTitoli();
        }

        async function loadTitoli() {
            try {
                const res = await fetch(`${API_URL}/titoli`);
                const data = await res.json();
                renderMenu(data.sinistra, 'menu-left');
                renderMenu(data.destra, 'menu-right');
            } catch(e) { console.error("Offline."); }
        }

        function renderMenu(list, id) {
            const cont = document.getElementById(id);
            cont.innerHTML = "";
            list.forEach((item, index) => {
                const d = document.createElement('div');
                d.className = 'file-link';
                d.innerHTML = `<span>† ${item.titolo}</span> ${(!isVip && index > 1) ? '🔒' : ''}`;
                d.onclick = () => { if (isVip || index <= 1) getStoria(item.titolo); else openVip(); };
                cont.appendChild(d);
            });
        }

        async function getStoria(prompt) {
            currentTitle = prompt;
            document.getElementById('share-box').style.display = "none";
            const ui = document.getElementById('ui-text');
            ui.innerHTML = "<span style='color:var(--blood)'>Evocazione...</span>";
            try {
                const res = await fetch(`${API_URL}/genera-storia`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ titolo: prompt })
                });
                const data = await res.json();
                currentText = data.testo;
                effettoScrittura(data.testo);
            } catch(e) { ui.innerText = "Errore."; }
        }

        function effettoScrittura(t) {
            let i = 0; const ui = document.getElementById('ui-text'); ui.innerHTML = "";
            function f() { 
                if(i < t.length) { 
                    ui.innerHTML += t.charAt(i) === "\n" ? "<br>" : t.charAt(i);
                    i++; setTimeout(f, 5); ui.scrollTop = ui.scrollHeight; 
                } else { document.getElementById('share-box').style.display = "block"; }
            }
            f();
        }

        function share(platform) {
            const fullMsg = encodeURIComponent(`Cronaca di "${currentTitle}" su Project Purgatory: ${SITE_URL}`);
            if(platform === 'wa') window.open(`https://api.whatsapp.com/send?text=${fullMsg}`);
            if(platform === 'fb') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(SITE_URL)}`);
            if(platform === 'tg') window.open(`https://t.me/share/url?url=${SITE_URL}&text=${fullMsg}`);
        }

        function openVip() { document.getElementById('payment-modal').style.display='block'; document.getElementById('overlay').style.display='block'; }
        function closeVip() { document.getElementById('payment-modal').style.display='none'; document.getElementById('overlay').style.display='none'; }
        function validaToken() {
            if(VIP_TOKENS.includes(document.getElementById('token-field').value.trim())) {
                localStorage.setItem('isVipOmbre', 'true');
                location.reload();
            } else { alert("TOKEN INVALIDO."); }
        }
        function accessAdmin() { if(prompt("PASS:") === "GREGORIO2026") { alert("TOKEN: " + VIP_TOKENS.join(", ")); } }
        function generaCustom() { if (!isVip) openVip(); else { const val = document.getElementById('user-prompt').value; if(val) getStoria(val); } }
        init();
    </script>
</body>
</html>
